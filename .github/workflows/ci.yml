name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20.19.0, cache: npm }
      - run: npm ci
      - run: npm run docs:check
      - run: npm run aos:check
      - run: npm run test:aos
      - run: npm run test:evidence
      - run: npm run memory:check
      - run: npm run aos:report
      - run: npm run aos:snapshot
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run build
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-core-artifacts
          path: |
            coverage/
            quality/generated/vitest-results.json
            quality/generated/aos-report.json
            quality/generated/aos-report.md
            public/generated/aos-snapshot.json
            quality/execution/latest/summary.json
            quality/execution/latest/failures.md
          retention-days: 14
          if-no-files-found: ignore

  functional-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20.19.0, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:functional
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functional-e2e-artifacts
          path: |
            playwright-report/
            test-results/
            quality/generated/playwright-functional-results.json
          retention-days: 14
          if-no-files-found: ignore

  cross-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20.19.0, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run test:cross-browser
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-browser-artifacts
          path: |
            playwright-report/
            test-results/
            quality/generated/playwright-cross-browser-results.json
          retention-days: 14
          if-no-files-found: ignore

  accessibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20.19.0, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:a11y
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-artifacts
          path: |
            playwright-report/
            test-results/
            quality/generated/playwright-a11y-results.json
          retention-days: 14
          if-no-files-found: ignore

  visual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20.19.0, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:visual
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-artifacts
          path: |
            playwright-report/
            test-results/
            quality/generated/playwright-visual-results.json
          retention-days: 14
          if-no-files-found: ignore

  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20.19.0, cache: npm }
      - run: npm ci
      - run: npm run test:performance
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-artifacts
          path: quality/generated/lighthouse/
          retention-days: 14
          if-no-files-found: ignore

  quality-summary:
    runs-on: ubuntu-latest
    needs:
      [
        quality-core,
        functional-e2e,
        cross-browser,
        accessibility,
        visual,
        performance,
      ]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20.19.0, cache: npm }
      - run: npm ci
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with: { name: quality-core-artifacts }
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with: { name: functional-e2e-artifacts }
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with: { name: cross-browser-artifacts }
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with: { name: accessibility-artifacts }
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with: { name: visual-artifacts }
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          { name: performance-artifacts, path: quality/generated/lighthouse }
      - run: npm run quality:collect
      - run: npm run quality:analyze
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-summary
          path: quality/generated/latest-quality-report.json
          retention-days: 30
          if-no-files-found: ignore
