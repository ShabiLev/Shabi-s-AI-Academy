name: CI

on:
  push:
    branches: [main, "fix/**"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

jobs:
  quality-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Verify exact triggering SHA
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - uses: actions/setup-node@v4
        with: { node-version: 20.19.0, cache: npm }
      - run: npm ci
      - run: npm run docs:check
      - run: npm run aos:check
      - run: npm run test:aos
      - run: npm run test:evidence
      - run: npm run memory:update
      - run: npm run memory:check
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run build
      - name: Write immutable job provenance
        if: always()
        run: node scripts/write-ci-job-manifest.mjs
        env:
          JOB_NAME: quality-core
          JOB_CONCLUSION: ${{ job.status }}
          ARTIFACT_PATHS: |
            coverage/
            quality/generated/vitest-results.json
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-core-artifacts
          path: |
            coverage/
            quality/generated/vitest-results.json
            quality/runtime/ci/quality-core/manifest.json
          retention-days: 14
          if-no-files-found: ignore

  functional-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify exact triggering SHA
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - uses: actions/setup-node@v4
        with: { node-version: 20.19.0, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:functional
      - name: Write immutable job provenance
        if: always()
        run: node scripts/write-ci-job-manifest.mjs
        env:
          JOB_NAME: functional-e2e
          JOB_CONCLUSION: ${{ job.status }}
          ARTIFACT_PATHS: |
            playwright-report/
            test-results/
            quality/generated/playwright-functional-results.json
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functional-e2e-artifacts
          path: |
            playwright-report/
            test-results/
            quality/generated/playwright-functional-results.json
            quality/runtime/ci/functional-e2e/manifest.json
          retention-days: 14
          if-no-files-found: ignore

  cross-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify exact triggering SHA
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - uses: actions/setup-node@v4
        with: { node-version: 20.19.0, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run test:e2e:cross-browser
      - name: Write immutable job provenance
        if: always()
        run: node scripts/write-ci-job-manifest.mjs
        env:
          JOB_NAME: cross-browser
          JOB_CONCLUSION: ${{ job.status }}
          ARTIFACT_PATHS: |
            playwright-report/
            test-results/
            quality/generated/playwright-cross-browser-results.json
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-browser-artifacts
          path: |
            playwright-report/
            test-results/
            quality/generated/playwright-cross-browser-results.json
            quality/runtime/ci/cross-browser/manifest.json
          retention-days: 14
          if-no-files-found: ignore

  accessibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify exact triggering SHA
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - uses: actions/setup-node@v4
        with: { node-version: 20.19.0, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:a11y
      - name: Write immutable job provenance
        if: always()
        run: node scripts/write-ci-job-manifest.mjs
        env:
          JOB_NAME: accessibility
          JOB_CONCLUSION: ${{ job.status }}
          ARTIFACT_PATHS: |
            playwright-report/
            test-results/
            quality/generated/playwright-a11y-results.json
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-artifacts
          path: |
            playwright-report/
            test-results/
            quality/generated/playwright-a11y-results.json
            quality/runtime/ci/accessibility/manifest.json
          retention-days: 14
          if-no-files-found: ignore

  visual-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify exact triggering SHA
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - uses: actions/setup-node@v4
        with: { node-version: 20.19.0, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:visual
      - name: Write immutable job provenance
        if: always()
        run: node scripts/write-ci-job-manifest.mjs
        env:
          JOB_NAME: visual-linux
          JOB_CONCLUSION: ${{ job.status }}
          ARTIFACT_PATHS: |
            playwright-report/
            test-results/
            quality/generated/playwright-visual-results.json
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-linux-artifacts
          path: |
            playwright-report/
            test-results/
            quality/generated/playwright-visual-results.json
            quality/runtime/ci/visual-linux/manifest.json
          retention-days: 14
          if-no-files-found: ignore

  visual-linux-candidates:
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'generate-linux-visual-candidates')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Verify exact triggering PR head SHA
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
      - name: Record provenance SHAs
        id: source
        run: |
          echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v4
        with: { node-version: 20.19.0, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Record environment provenance
        id: env
        run: |
          playwright_version=$(node -p "require('./package.json').devDependencies['@playwright/test'] ?? require('./package.json').dependencies['@playwright/test']")
          browser_revision=$(ls "$HOME/.cache/ms-playwright" 2>/dev/null | grep '^chromium' | head -1)
          echo "playwright_version=${playwright_version}" >> "$GITHUB_OUTPUT"
          echo "browser_revision=${browser_revision:-unknown}" >> "$GITHUB_OUTPUT"
          echo "linux_image_version=${ImageOS:-unknown}-${ImageVersion:-unknown}" >> "$GITHUB_OUTPUT"
      - name: Capture existing Linux baselines
        run: node quality/scripts/visual-candidate-manifest.mjs capture
      - name: Capture pre-generation comparison evidence
        continue-on-error: true
        env:
          CI: "true"
          VISUAL_BASELINE_MODE: compare
          PW_WORKERS: "1"
          PW_REPORT_NAME: visual-candidates-before
        run: |
          set +e
          npx playwright test e2e/specs/visual.spec.ts --project=visual-chromium
          comparison_status=$?
          set -e
          mv test-results candidate-test-results
          mv playwright-report candidate-playwright-report
          exit "$comparison_status"
      - name: Generate review candidates (never committed automatically)
        env:
          CI: "true"
          GITHUB_EVENT_NAME: pull_request
          VISUAL_UPDATE_APPROVED: "1"
          VISUAL_UPDATE_CONTEXT: pull-request-candidates
          VISUAL_BASELINE_MODE: generate-candidates
          PW_WORKERS: "1"
          PW_REPORT_NAME: visual
        run: |
          node quality/scripts/require-visual-update.mjs
          npx playwright test e2e/specs/visual.spec.ts --project=visual-chromium --update-snapshots=missing
      - name: Verify generated candidates
        env:
          VISUAL_BASELINE_MODE: compare
          PW_WORKERS: "1"
          PW_REPORT_NAME: visual
        run: npx playwright test e2e/specs/visual.spec.ts --project=visual-chromium
      - name: Write candidate manifest
        if: always()
        run: node quality/scripts/visual-candidate-manifest.mjs build
        env:
          EXPECTED_HEAD_SHA: ${{ steps.source.outputs.head_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SOURCE_BRANCH: ${{ github.head_ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PLAYWRIGHT_VERSION: ${{ steps.env.outputs.playwright_version }}
          BROWSER_REVISION: ${{ steps.env.outputs.browser_revision }}
          LINUX_IMAGE_VERSION: ${{ steps.env.outputs.linux_image_version }}
          SUITE_GROUP: pull-request-${{ github.event.pull_request.number }}
          VIEWPORT_GROUP: desktop
          LANGUAGE_GROUP: he-en
      - name: Write candidate provenance
        if: always()
        run: node scripts/write-ci-job-manifest.mjs
        env:
          EXPECTED_HEAD_SHA: ${{ steps.source.outputs.head_sha }}
          SOURCE_BRANCH: ${{ github.head_ref }}
          TARGET_BRANCH: ${{ github.base_ref }}
          JOB_NAME: visual-linux-candidates
          JOB_CONCLUSION: ${{ job.status }}
          ARTIFACT_PATHS: |
            e2e/specs/__screenshots__/
            playwright-report/
            test-results/
            quality/generated/playwright-visual-results.json
            quality/generated/visual-candidate-manifest.json
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-linux-candidates-pr${{ github.event.pull_request.number }}-${{ github.run_id }}
          path: |
            e2e/specs/__screenshots__/*-linux.png
            playwright-report/
            test-results/
            quality/generated/playwright-visual-results.json
            quality/generated/playwright-visual-candidates-before-results.json
            quality/generated/visual-candidate-manifest.json
            candidate-playwright-report/
            candidate-test-results/
            quality/runtime/ci/visual-linux-candidates/manifest.json
          retention-days: 14
          if-no-files-found: error

  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify exact triggering SHA
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - uses: actions/setup-node@v4
        with: { node-version: 20.19.0, cache: npm }
      - run: npm ci
      - run: npm run test:performance
      - name: Write immutable job provenance
        if: always()
        run: node scripts/write-ci-job-manifest.mjs
        env:
          JOB_NAME: performance
          JOB_CONCLUSION: ${{ job.status }}
          ARTIFACT_PATHS: quality/generated/lighthouse/
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-artifacts
          path: |
            quality/generated/lighthouse/
            quality/runtime/ci/performance/manifest.json
          retention-days: 14
          if-no-files-found: ignore

  quality-summary:
    runs-on: ubuntu-latest
    needs: [quality-core, functional-e2e, cross-browser, accessibility, visual-linux, performance]
    if: always()
    env:
      QUALITY_CORE: ${{ needs.quality-core.result }}
      FUNCTIONAL_E2E: ${{ needs.functional-e2e.result }}
      CROSS_BROWSER: ${{ needs.cross-browser.result }}
      ACCESSIBILITY: ${{ needs.accessibility.result }}
      VISUAL_LINUX: ${{ needs.visual-linux.result }}
      PERFORMANCE: ${{ needs.performance.result }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify exact triggering SHA
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - uses: actions/setup-node@v4
        with: { node-version: 20.19.0, cache: npm }
      - run: npm ci
      - uses: actions/download-artifact@v4
        if: always()
        with: { pattern: "*-artifacts", merge-multiple: true }
      - name: Restore Lighthouse artifact layout
        uses: actions/download-artifact@v4
        if: always()
        with:
          name: performance-artifacts
          path: quality/generated/lighthouse
      - run: npm run quality:collect
        if: always()
      - run: npm run quality:analyze
        if: always()
      - name: Write readable gate summary and enforce results
        if: always()
        run: node scripts/write-ci-quality-summary.mjs
      - name: Write immutable job provenance
        if: always()
        run: node scripts/write-ci-job-manifest.mjs
        env:
          JOB_NAME: quality-summary
          JOB_CONCLUSION: ${{ job.status }}
          ARTIFACT_PATHS: |
            quality/generated/latest-quality-report.json
            quality/generated/ci-quality-summary.md
            quality/generated/ci-quality-summary.json
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-summary
          path: |
            quality/generated/latest-quality-report.json
            quality/generated/ci-quality-summary.md
            quality/generated/ci-quality-summary.json
            quality/runtime/ci/quality-summary/manifest.json
          retention-days: 30
          if-no-files-found: ignore
