name: Deploy GitHub Pages

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    env:
      EXPECTED_DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.EXPECTED_DEPLOY_SHA }}
          fetch-depth: 0
      - name: Verify tested commit checkout
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_DEPLOY_SHA"
      - uses: actions/setup-node@v4
        with: { node-version: 20.19.0, cache: npm }
      - run: npm ci
      - run: npm run build:pages
        env:
          VITE_BASE_PATH: /Shabi-s-AI-Academy/
          VITE_ROUTER_MODE: hash
          VITE_DEPLOYMENT_PROVIDER: github-pages
          VITE_PUBLIC_SITE_URL: https://shabilev.github.io/Shabi-s-AI-Academy
          VITE_DEPLOY_COMMIT_SHA: ${{ env.EXPECTED_DEPLOY_SHA }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - run: node scripts/validate-pages-build.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: dist }

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy the CI-tested artifact
        id: deployment
        uses: actions/deploy-pages@v4
