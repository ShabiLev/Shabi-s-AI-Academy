name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
      - run: npm ci
      - run: npm run docs:check
      - run: npm run aos:check
      - run: npm run test:aos
      - run: npm run test:evidence
      - run: npm run memory:check
      - run: npm run lint
      - run: npm run test:run
      - run: npm run build
        env:
          VITE_BASE_PATH: /Shabi-s-AI-Academy/
          VITE_ROUTER_MODE: hash
          VITE_DEPLOYMENT_PROVIDER: github-pages
          VITE_PUBLIC_SITE_URL: https://shabilev.github.io/Shabi-s-AI-Academy
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - run: node scripts/validate-pages-build.mjs
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
